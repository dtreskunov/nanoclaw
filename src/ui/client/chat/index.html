<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NanoClaw" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <base href="/ui/chat/" />
    <title>NanoClaw</title>
    <style>
      :root {
        color-scheme: light dark;

        /* Surface (auto-themed by `color-scheme`). */
        --surface: Canvas;
        --surface-fg: CanvasText;

        /* Lines and text. */
        --border: rgba(127, 127, 127, 0.25);
        --border-strong: rgba(127, 127, 127, 0.40);
        --muted: rgba(127, 127, 127, 0.7);

        /* Accent wash (used for selected rows, in-bubble bg, etc.). */
        --accent: rgba(100, 150, 255, 0.18);
        --accent-strong: rgba(100, 150, 255, 0.35);

        /* Neutral overlays — mid-gray so they read identically in light
           and dark. Used for hover, dividers, code blocks, fills. */
        --wash-subtle: rgba(127, 127, 127, 0.05);
        --wash-soft:   rgba(127, 127, 127, 0.08);
        --wash:        rgba(127, 127, 127, 0.12);
        --wash-strong: rgba(127, 127, 127, 0.18);

        /* One-offs. */
        --head-tint:    rgba(255, 255, 255, 0.02);
        --selection:    rgba(127, 127, 255, 0.08);
        --drag-target:  rgba(80, 140, 220, 0.18);

        /* Overlays and shadows. */
        --scrim:                rgba(0, 0, 0, 0.40);
        --shadow-color:         rgba(0, 0, 0, 0.28);
        --shadow-color-strong:  rgba(0, 0, 0, 0.35);

        /* Status colors. */
        --danger:     #c0392b;
        --error:      #e44;
        --error-soft: #e66;
        --warning:    #e90;
        --success:    #6c6;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; overflow-x: hidden; overscroll-behavior-x: none; }
      body { font: 14px/1.4 system-ui, -apple-system, sans-serif; height: 100vh; height: 100dvh; height: var(--app-height, 100dvh); overflow-y: hidden; }
      #app { display: flex; flex-direction: column; height: 100%; min-height: 0; }
      button { font: inherit; padding: 4px 10px; border: 1px solid var(--border); background: transparent; border-radius: 4px; cursor: pointer; color: inherit; }
      button:hover { background: var(--wash); }
      .icon-btn { padding: 4px 8px; }
      .empty { color: var(--muted); padding: 16px; font-style: italic; font-size: 13px; }

      /* Header */
      header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      header .brand { font-size: 14px; font-weight: 600; white-space: nowrap; }
      header select { font: inherit; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: inherit; max-width: 280px; }
      header .spacer { flex: 1; }
      header .user { font-size: 12px; color: var(--muted); }
      header .mobile-only { display: none; }
      .desktop-only { }

      /* Body grid */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        min-height: 0;
      }
      main.threads-collapsed { grid-template-columns: 40px 1fr 1fr; }
      main.files-collapsed { grid-template-columns: 1fr 1fr 40px; }
      main.threads-collapsed.files-collapsed { grid-template-columns: 40px 1fr 40px; }

      /* ── .nc-pane — reusable collapsible side panel ────────── */
      /* Markup:                                                             */
      /*   <aside class="nc-pane [my-pane] [no-animate]">                    */
      /*     <div class="head">                                              */
      /*       <button class="icon-btn">›</button>                           */
      /*       <span class="title">Label</span>                              */
      /*     </div>                                                          */
      /*     <div class="my-body">…</div>                                    */
      /*   </aside>                                                          */
      /* JS: registerPane(id, () => isOpen, toggleFn). Toggling adds/removes */
      /* the `collapsed` class on the pane; CSS handles the rest.            */
      :root { --handle-h: 40px; --collapsed-w: 40px; }

      .nc-pane { position: relative; overflow: hidden; min-height: 0; }
      .nc-pane.collapsed { cursor: pointer; }
      .nc-pane.collapsed:hover > .head { background: var(--wash-soft); }
      .nc-pane.collapsed > :not(.head) { display: none; }

      .nc-pane > .head {
        position: absolute; top: 0; left: 0; right: 0;
        height: var(--handle-h);
        display: flex; align-items: center; gap: 8px;
        padding: 0 10px;
        border-bottom: 1px solid var(--border);
        background: var(--head-tint);
        white-space: nowrap;
        z-index: 2;
        cursor: pointer;
      }
      .nc-pane > .head:hover { background: var(--wash-soft); }
      .nc-pane.collapsed > .head {
        right: auto; width: var(--collapsed-w);
        flex-direction: column; gap: 6px;
        justify-content: flex-start; padding: 8px 0;
        border-bottom-color: transparent;
        border-right: 1px solid var(--border);
      }
      .nc-pane.collapsed > .head .title {
        flex: 0 0 auto;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        text-align: left;
      }
      .nc-pane > .head .icon-btn {
        min-width: 24px; min-height: 24px; padding: 0; border: 0;
        font-size: 16px; line-height: 1;
        display: inline-flex; align-items: center; justify-content: center;
      }
      #btn-threads-toggle::before { content: '‹'; }
      .threads-rail.collapsed #btn-threads-toggle::before { content: '›'; }
      #btn-files-toggle::before { content: '›'; }
      .files-pane.collapsed #btn-files-toggle::before { content: '‹'; }
      .nc-pane > .head .title {
        flex: 1; font-size: 13px; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
      }

      /* Threads rail (pane-specific) */
      .threads-rail { border-right: 1px solid var(--border); }
      .threads-rail .threads-actions {
        position: absolute; top: var(--handle-h); left: 0; right: 0;
        padding: 8px;
        border-bottom: 1px solid var(--border);
      }
      .threads-rail .threads-actions #btn-new-chat { width: 100%; font-size: 13px; font-weight: 600; }
      .threads-rail .list {
        position: absolute; left: 0; right: 0; bottom: 0;
        top: calc(var(--handle-h) + 49px);
        overflow: auto;
      }
      .rail-label { display: none; }
      .threads-rail .thread { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); position: relative; }
      .threads-rail .thread:hover { background: var(--wash-soft); }
      .threads-rail .thread.active { background: var(--accent); }
      .threads-rail .thread .title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 18px; }
      .threads-rail .thread .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .threads-rail .thread .title .ch-pill { font-size: 13px; margin-right: 5px; opacity: 0.85; display: inline-block; vertical-align: -1px; }
      .readonly-banner { padding: 10px 12px; border-top: 1px solid var(--border); background: var(--wash-soft); font-size: 12px; color: var(--muted); }
      .chat-subnotice { padding: 4px 12px; border-top: 1px solid var(--border); background: var(--wash-subtle); font-size: 11px; color: var(--muted); }
      .threads-rail .thread .del { position: absolute; top: 6px; right: 6px; padding: 0 5px; border: 0; background: transparent; cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; display: none; }
      .threads-rail .thread:hover .del { display: block; }
      .threads-rail .thread .del:hover { color: var(--error); }
      .threads-rail .thread-section { padding: 8px 10px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
      .threads-rail .thread.dm .title { font-size: 14px; padding-right: 0; }
      .threads-rail .thread.dm .title .ch-pill.dm { font-size: 18px; margin-right: 8px; opacity: 1; vertical-align: -2px; }

      /* Chat main */
      .chat-main { display: grid; grid-template-rows: 1fr auto auto auto auto; min-height: 0; position: relative; }
      .chat-main .log { overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
      .chat-main .msg { padding: 6px 10px; border-radius: 6px; max-width: 78%; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
      .chat-main .msg.in { align-self: flex-end; background: var(--accent); }
      .chat-main .msg.out { align-self: flex-start; background: var(--wash); }
      .chat-main .msg.internal { align-self: flex-start; background: transparent; border: 1px dashed var(--border, var(--muted)); color: var(--muted); font-style: italic; opacity: 0.85; max-width: 92%; }
      .chat-main .msg.internal::before { content: 'internal'; display: block; font-size: 10px; font-style: normal; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 2px; opacity: 0.7; }
      .chat-main .msg .files { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px; }
      .chat-main .msg .file-chip { font: inherit; color: inherit; background: var(--wash-strong); border: 1px solid var(--border, transparent); border-radius: 4px; padding: 2px 6px; cursor: pointer; }
      .chat-main .msg .file-chip:hover { background: var(--accent); color: var(--fg); }
      .chat-main .msg .file-chip.inert { cursor: default; opacity: 0.7; }
      .chat-main .msg .file-chip.inert:hover { background: var(--wash-strong); color: var(--muted); }
      .chat-main .msg .meta { font-size: 10px; color: var(--muted); margin-top: 4px; opacity: 0.7; }
      .chat-main .msg.in .meta { text-align: right; }
      .chat-main .msg.markdown { white-space: normal; }
      .chat-main .msg.markdown > :first-child { margin-top: 0; }
      .chat-main .msg.markdown > :last-child { margin-bottom: 0; }
      .chat-main .msg.markdown p { margin: 4px 0; }
      .chat-main .msg.markdown pre { background: var(--wash-strong); padding: 8px; border-radius: 4px; overflow: auto; font-size: 12px; }
      .chat-main .msg.markdown code { background: var(--wash-strong); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
      .chat-main .msg.markdown pre code { background: transparent; padding: 0; }
      .chat-main .msg.markdown ul, .chat-main .msg.markdown ol { margin: 4px 0; padding-left: 20px; }
      .chat-main .typing { align-self: flex-start; display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; background: var(--wash); border-radius: 6px; max-width: 78%; }
      .chat-main .typing > span:not(.hint) { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); opacity: 0.5; animation: typing-bounce 1.2s infinite ease-in-out; }
      .chat-main .typing > span:nth-child(2) { animation-delay: 0.15s; }
      .chat-main .typing > span:nth-child(3) { animation-delay: 0.3s; }
      .chat-main .typing .hint { font-size: 11px; color: var(--muted); font-style: italic; margin-left: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
      @keyframes typing-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.35; } 30% { transform: translateY(-3px); opacity: 0.85; } }
      .chat-main .msg.markdown h1, .chat-main .msg.markdown h2, .chat-main .msg.markdown h3 { margin: 8px 0 4px; font-size: 1.05em; }
      .chat-main .msg.markdown a { color: inherit; text-decoration: underline; }
      .chat-main .msg.markdown blockquote { border-left: 3px solid var(--border-strong); margin: 4px 0; padding: 0 8px; color: var(--muted); font-size: 12px; }

      .chat-main .status { padding: 0 16px; font-size: 11px; color: var(--muted); min-height: 14px; }
      .chat-main .context { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; padding: 4px 16px; font-size: 11px; color: var(--muted); }
      .chat-main .context .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--accent); padding: 2px 6px; border-radius: 10px; max-width: 100%; }
      .chat-main .context .chip .path { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; font-family: ui-monospace, monospace; }
      .chat-main .context .chip button { padding: 0 4px; border: 0; background: transparent; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; }
      .chat-main .pending { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 16px; font-size: 11px; color: var(--muted); }
      .chat-main .pending .item { display: inline-flex; align-items: center; gap: 4px; background: var(--wash-strong); padding: 2px 6px; border-radius: 10px; }
      .chat-main .pending .item button { padding: 0 4px; border: 0; background: transparent; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; }
      .chat-main form { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border); }
      .chat-main textarea { flex: 1; min-height: 32px; max-height: 140px; resize: vertical; padding: 6px 8px; font: inherit; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: inherit; }
      .chat-main.drag-active { outline: 2px dashed var(--accent-strong); outline-offset: -4px; }

      /* Files pane */
      .files-pane { border-left: 1px solid var(--border); }
      .files-pane .files-body {
        position: absolute; top: var(--handle-h); left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; min-height: 0;
      }
      .files-pane .breadcrumb {
        display: flex; align-items: center; gap: 2px;
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        overflow-x: auto;
        scrollbar-width: none;
        white-space: nowrap;
      }
      .files-pane .breadcrumb::-webkit-scrollbar { display: none; }
      .files-pane .breadcrumb .crumb {
        display: inline-flex; align-items: center;
        padding: 3px 7px; border-radius: 4px;
        color: var(--muted); cursor: pointer; text-decoration: none;
        background: transparent; border: 0; font: inherit;
        flex: 0 0 auto;
      }
      .files-pane .breadcrumb .crumb:hover { background: var(--wash); color: inherit; }
      .files-pane .breadcrumb .crumb.current { color: inherit; cursor: default; }
      .files-pane .breadcrumb .crumb.current:hover { background: transparent; }
      .files-pane .breadcrumb .crumb.root { padding: 3px 6px; font-size: 14px; line-height: 1; }
      .files-pane .breadcrumb .sep { color: var(--muted); opacity: 0.5; padding: 0 1px; user-select: none; }
      .files-pane .files-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      .files-pane .listing { flex: 1; overflow: auto; }
      .files-pane .row { display: flex; align-items: center; gap: 8px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
      .files-pane .row:hover { background: var(--wash); }
      .files-pane .row.active { background: var(--accent); }
      .files-pane .row.selected { background: var(--selection); }
      .files-pane .row.selected.active { background: var(--accent); }
      .files-pane .row .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .files-pane .row .size { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
      .files-pane .row .meta { font-size: 11px; color: var(--muted); white-space: nowrap; opacity: 0.7; }
      .files-pane .row .row-sel { display: inline-flex; align-items: center; cursor: pointer; }
      .files-pane .row .row-sel input { margin: 0; cursor: pointer; }
      .files-pane .row .row-actions { display: inline-flex; }
      .files-pane .row .row-actions .action-trigger { color: var(--muted); }
      .files-pane .row:hover .row-actions .action-trigger,
      .files-pane .row .action-menu.open .action-trigger { color: inherit; }

      /* admin-only UI is hidden until JS adds .is-admin on body */
      .admin-only { display: none; }
      body.is-admin .admin-only { display: inline-flex; }
      body.is-admin .files-pane .drop-hint { display: block; }
      /* Hide admin actions when the files pane is collapsed. */
      body.is-admin .files-pane.collapsed .admin-only { display: none; }
      /* Action overlay anchored to the right edge of the files pane,
         sitting on top of the .head so the title can flex underneath. */
      .files-pane .head-actions {
        position: absolute; top: 0; right: 0;
        height: var(--handle-h);
        display: flex; align-items: center; gap: 6px;
        padding: 0 10px;
        z-index: 3;
      }
      .files-pane.collapsed .head-actions { display: none; }
      /* Small text button for header actions like UPL. */
      .files-pane .text-btn {
        background: transparent; border: 1px solid var(--border);
        color: var(--muted); cursor: pointer;
        font-size: 11px; font-weight: 600; line-height: 1;
        padding: 3px 6px; border-radius: 3px;
        font-family: inherit;
      }
      .files-pane .text-btn:hover { color: inherit; background: var(--wash); }

      /* Unified actions menu (⋯) used in row, header, and preview. */
      .action-menu { position: relative; display: inline-block; }
      .action-menu .action-trigger {
        font-size: 14px; line-height: 1; padding: 2px 6px;
        border: 1px solid transparent;
      }
      .action-menu.open .action-trigger { border-color: var(--border); background: var(--wash); }
      .action-panel {
        position: absolute; top: 100%; right: 0; margin-top: 4px;
        min-width: 180px; z-index: 50;
        background: var(--surface); color: var(--surface-fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        box-shadow: 0 6px 24px var(--shadow-color);
        padding: 4px 0;
      }
      .action-item {
        display: flex; align-items: center; gap: 8px; width: 100%;
        background: transparent; border: 0; cursor: pointer;
        padding: 6px 12px; font-size: 12px; line-height: 1.4;
        color: inherit; text-align: left; font-family: inherit;
      }
      .action-item:hover:not(:disabled) { background: var(--wash); }
      .action-item:disabled { opacity: 0.4; cursor: default; }
      .action-item .ico { width: 16px; text-align: center; opacity: 0.8; }
      .action-item.danger { color: var(--danger); }
      .action-sep { height: 1px; background: var(--border); margin: 4px 0; }

      .files-pane .preview-toolbar {
        display: flex; align-items: center; gap: 10px;
        padding-bottom: 8px; margin-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }
      .files-pane .preview-toolbar .meta { font-size: 11px; color: var(--muted); }
      .files-pane .preview-toolbar a.text-btn { text-decoration: none; display: inline-block; }
      .files-pane .preview-toolbar .clippy { font-size: 13px; padding: 2px 6px; }
      .files-pane .preview-toolbar .clippy.active { color: inherit; background: var(--accent); }
      .files-pane .preview-toolbar .clippy:disabled { opacity: 0.4; cursor: default; background: transparent; }

      /* Reusable media player widget — sticks to the top of the preview
         body while the metadata / transcript / etc scrolls underneath. */
      .media-player {
        position: sticky; top: 0; z-index: 4;
        margin: 0 0 12px 0;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        box-shadow: 0 2px 8px var(--shadow-color);
      }
      .media-player audio,
      .media-player video { display: block; width: 100%; }
      .media-player-video video { max-height: 60vh; background: black; border-radius: 3px; }
      .media-player-audio audio { height: 36px; }

      .files-pane .preview-meta {
        margin: 0 0 8px 0;
        padding: 6px 8px;
        background: var(--wash-soft);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
      }
      .files-pane .preview-meta > summary {
        display: block;
        list-style: none;
        cursor: pointer;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .files-pane .preview-meta > summary::-webkit-details-marker { display: none; }
      .files-pane .preview-meta > summary:hover { color: var(--surface-fg); }
      .files-pane .preview-meta:not([open]):hover { background: var(--wash); border-color: var(--accent); }
      .files-pane .preview-meta[open] > summary {
        margin-bottom: 6px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
        white-space: normal;
      }
      .files-pane .preview-meta-rows {
        margin: 0;
        display: grid;
        /* auto-fill pairs of [label | value] tracks; each pair is one visual
           column. Each .row spans one pair and uses subgrid so labels share
           a track width across all rows in that visual column. */
        grid-template-columns: repeat(auto-fill, [label] minmax(60px, max-content) [value] minmax(120px, 1fr));
        column-gap: 24px;
        row-gap: 3px;
      }
      .files-pane .preview-meta-rows .row {
        display: grid;
        grid-template-columns: subgrid;
        grid-column: span 2;
        column-gap: 12px;
        min-width: 0;
      }
      .files-pane .preview-meta-rows dt { color: var(--muted); white-space: nowrap; }
      .files-pane .preview-meta-rows dd { margin: 0; overflow-wrap: anywhere; min-width: 0; }

      .files-pane .preview-lyrics {
        margin: 0 0 12px 0;
        background: var(--wash-soft);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
        max-height: 40vh;
        overflow: auto;
        position: relative;
      }
      .files-pane .preview-lyrics .lyrics-toggle {
        position: sticky;
        top: 0;
        float: right;
        margin: 6px 6px 0 0;
        padding: 2px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 10px;
        box-shadow: 0 1px 4px var(--shadow-color);
        z-index: 2;
      }
      .files-pane .preview-lyrics .lyrics-toggle button {
        background: transparent;
        border: 0;
        color: var(--muted);
        padding: 2px 8px;
        cursor: pointer;
        border-radius: 2px;
        font: inherit;
        line-height: 1;
      }
      .files-pane .preview-lyrics .lyrics-toggle button:hover { background: var(--wash); }
      .files-pane .preview-lyrics pre {
        margin: 0;
        padding: 10px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-family: inherit;
        font-size: 12px;
        line-height: 1.5;
      }
      .files-pane .preview-lyrics ol.lyrics-synced {
        list-style: none;

        padding: 10px;

      }
      .files-pane .preview-lyrics ol.lyrics-synced li {

        border-radius: 3px;
        cursor: pointer;
        transition: background 120ms ease;
      }
      .files-pane .preview-lyrics ol.lyrics-synced li:hover {
        background: var(--wash);
      }
      .files-pane .preview-lyrics ol.lyrics-synced li.active {
        background: var(--accent);
        font-weight: 500;
      }

      /* Drag-and-drop hint pinned to bottom of files-body */
      .files-pane .drop-hint {
        border-top: 1px solid var(--border);
        padding: 6px 10px;
        font-size: 11px;
        color: var(--muted);

        background: var(--wash-subtle);
        transition: background 0.12s, color 0.12s;
      }
      .files-pane .drop-hint code {
        background: var(--wash-strong);
        padding: 0 4px;
        border-radius: 3px;
      }
      .files-pane .drop-hint.drag-over {
        background: var(--drag-target);
        color: inherit;
      }

      /* Upload progress strip */
      .files-pane .upload-strip {
        border-bottom: 1px solid var(--border);
        background: var(--wash-subtle);
        padding: 6px 8px;
        display: flex; flex-direction: column; gap: 4px;
        max-height: 40vh; overflow: auto;
      }
      .upload-strip .row {
        display: flex; align-items: center; gap: 8px; font-size: 12px;
        padding: 2px 0;
      }
      .upload-strip .row .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .upload-strip .row .bar {
        width: 60px; height: 4px; background: var(--wash-strong); border-radius: 2px; overflow: hidden;
      }
      .upload-strip .row .bar > i { display: block; height: 100%; background: var(--accent); width: 0; }
      .upload-strip .row.ok .status { color: var(--success); }
      .upload-strip .row.error .status { color: var(--error-soft); }
      .upload-strip .row.conflict .status { color: var(--warning); }
      .upload-strip .row .actions button {
        background: transparent; border: 1px solid var(--border); color: inherit;
        font-size: 11px; padding: 1px 6px; border-radius: 3px; cursor: pointer;
      }
      .upload-strip .row .actions button:hover { background: var(--wash); }
      .upload-strip .footer {
        display: flex; justify-content: space-between; align-items: center;
        gap: 8px; padding-top: 4px; border-top: 1px solid var(--border);
        margin-top: 4px;
      }
      .upload-strip .footer button {
        background: var(--accent); color: white; border: 0;
        font-size: 12px; padding: 3px 10px; border-radius: 3px; cursor: pointer;
      }
      .upload-strip .footer button[disabled] { opacity: 0.5; cursor: not-allowed; }
      .upload-strip .footer .close {
        background: transparent; color: var(--muted); border: 0;
        cursor: pointer; font-size: 16px; line-height: 1;
      }

      /* Preview body — occupies the files pane below the breadcrumb when a file is selected. */
      .files-pane .preview-body {
        flex: 1; min-height: 0; overflow: auto;
        padding: 12px; display: none;
      }
      .files-pane.previewing .listing,
      .files-pane.previewing .upload-strip,
      .files-pane.previewing .drop-hint { display: none !important; }
      .files-pane.previewing .preview-body { display: block; }
      .files-pane.previewing .head-actions { display: none !important; }
      .files-pane pre { margin: 0; white-space: pre-wrap; word-break: break-word; font: 12px/1.5 ui-monospace, monospace; }
      .files-pane img, .files-pane iframe { max-width: 100%; }
      .markdown-preview { max-width: 100%; line-height: 1.5; }
      .markdown-preview pre { background: var(--wash-strong); padding: 12px; border-radius: 6px; overflow: auto; }
      .markdown-preview code { background: var(--wash-strong); padding: 2px 4px; border-radius: 3px; }
      .markdown-preview pre code { background: transparent; padding: 0; }
      .markdown-preview blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding-left: 12px; color: var(--muted); }
      .markdown-preview table { border-collapse: collapse; margin: 8px 0; }
      .markdown-preview th, .markdown-preview td { border: 1px solid var(--border); padding: 4px 8px; }

      /* Syntax highlighting for text-file preview. Minimal theme tuned
         to follow the rest of the chrome via CSS vars and currentColor.
         Uses standard highlight.js token class names. */
      .files-pane pre.hljs {
        background: var(--wash-soft);
        border: 1px solid var(--border);
        padding: 12px;
        border-radius: 4px;
        overflow: auto;
        position: relative;
      }
      .files-pane pre.hljs code { font: inherit; background: transparent; padding: 0; white-space: pre; }
      .files-pane pre.hljs::before {
        content: attr(data-lang);
        position: absolute; top: 4px; right: 8px;
        font-size: 10px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.5px;
        pointer-events: none;
      }
      .hljs-comment, .hljs-quote { color: var(--muted); font-style: italic; }
      .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name, .hljs-tag {
        color: #a26aff;
      }
      .hljs-string, .hljs-doctag, .hljs-template-tag, .hljs-template-variable,
      .hljs-regexp, .hljs-link, .hljs-meta-string {
        color: #c8923a;
      }
      .hljs-number, .hljs-literal, .hljs-symbol, .hljs-bullet, .hljs-variable {
        color: #2da671;
      }
      .hljs-title, .hljs-section, .hljs-attr, .hljs-attribute, .hljs-function .hljs-title {
        color: #2f7be0;
      }
      .hljs-type, .hljs-class .hljs-title, .hljs-params {
        color: #b8632a;
      }
      .hljs-meta, .hljs-meta-keyword { color: var(--muted); }
      .hljs-deletion { background: rgba(220, 80, 80, 0.18); }
      .hljs-addition { background: rgba(80, 200, 100, 0.18); }
      .hljs-emphasis { font-style: italic; }
      .hljs-strong { font-weight: 600; }
      @media (prefers-color-scheme: dark) {
        .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name, .hljs-tag { color: #c792ea; }
        .hljs-string, .hljs-doctag, .hljs-template-tag, .hljs-template-variable,
        .hljs-regexp, .hljs-link, .hljs-meta-string { color: #ecc48d; }
        .hljs-number, .hljs-literal, .hljs-symbol, .hljs-bullet, .hljs-variable { color: #addb67; }
        .hljs-title, .hljs-section, .hljs-attr, .hljs-attribute, .hljs-function .hljs-title { color: #82aaff; }
        .hljs-type, .hljs-class .hljs-title, .hljs-params { color: #f78c6c; }
      }

      /* Backdrop for mobile drawers */
      .backdrop { display: none; position: fixed; inset: 0; background: var(--scrim); z-index: 5; }
      .backdrop.show { display: block; }

      /* Settings modal */
      .settings-backdrop {
        position: fixed; inset: 0; background: var(--scrim);
        z-index: 20; display: flex; align-items: flex-start; justify-content: center;
        padding: 40px 16px; overflow-y: auto;
      }
      .settings-modal {
        background: var(--surface); color: var(--surface-fg);
        border: 1px solid var(--border); border-radius: 8px;
        box-shadow: 0 10px 32px var(--shadow-color-strong);
        width: 100%; max-width: 640px; max-height: calc(100vh - 80px);
        display: flex; flex-direction: column; overflow: hidden;
      }
      .settings-head {
        display: flex; align-items: center; gap: 8px;
        padding: 12px 14px; border-bottom: 1px solid var(--border);
        background: var(--head-tint);
      }
      .settings-head .title { flex: 1; font-weight: 600; font-size: 15px; }
      .settings-body { padding: 16px; overflow-y: auto; }
      .settings-body section { margin-bottom: 24px; }
      .settings-body section:last-child { margin-bottom: 0; }
      .settings-body h3 { margin: 0 0 8px; font-size: 14px; font-weight: 600; }
      .settings-body h4 { margin: 16px 0 8px; font-size: 13px; font-weight: 600; }
      .settings-body p.muted { margin: 4px 0 12px; color: var(--muted); font-size: 13px; }
      .settings-row {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin: 6px 0;
      }
      .settings-row input[type="text"], .settings-row input:not([type]),
      .settings-row select {
        font: inherit; padding: 6px 8px;
        border: 1px solid var(--border); border-radius: 4px;
        background: transparent; color: inherit;
      }
      .settings-row input { flex: 1; min-width: 0; }
      .settings-row input[type="checkbox"] { flex: none; }
      .settings-body button.danger { color: var(--danger); border-color: var(--danger); }
      .settings-body button.danger:hover { background: var(--danger); color: #fff; }
      .settings-body button.ghost { background: transparent; }
      .settings-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
      .settings-table th, .settings-table td {
        text-align: left; padding: 6px 8px;
        border-bottom: 1px solid var(--border);
      }
      .settings-table th { font-weight: 600; color: var(--muted); }
      .settings-status {
        margin-top: 12px; padding: 8px 12px; border-radius: 4px; font-size: 13px;
      }
      .settings-status.ok { background: rgba(108, 198, 108, 0.15); color: var(--success); }
      .settings-status.err { background: rgba(228, 68, 68, 0.15); color: var(--error); }

      /* Mobile layout */
      @media (max-width: 720px) {
        header {
          padding: max(8px, env(safe-area-inset-top)) 10px 8px;
          padding-left: max(10px, env(safe-area-inset-left));
          padding-right: max(10px, env(safe-area-inset-right));
          gap: 6px;
        }
        header .mobile-only { display: inline-flex; }
        .desktop-only { display: none !important; }
        header .brand, header #me, header .spacer { display: none !important; }
        header select { flex: 1; min-width: 0; max-width: none; min-height: 44px; height: 44px; font-size: 15px; }
        header .icon-btn { min-width: 44px; min-height: 44px; font-size: 22px; padding: 4px 8px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
        header form { flex-shrink: 0; margin: 0; }
        header form button { min-height: 44px; min-width: 44px; padding: 4px 8px; position: relative; font-size: 0; }
        header form button svg { width: 22px; height: 22px; vertical-align: middle; }
        main {
          grid-template-columns: 1fr !important;
          grid-template-rows: 1fr;
        }
        .threads-rail, .files-pane {
          position: fixed;
          top: 0; bottom: 0;
          width: min(86vw, 340px) !important;
          background: Canvas;
          z-index: 10;
          transition: transform 0.18s ease-out;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
        }
        .threads-rail { left: 0; transform: translateX(-100%); }
        .threads-rail.open { transform: translateX(0); box-shadow: 2px 0 16px var(--shadow-color-strong); }
        .files-pane { right: 0; transform: translateX(100%); border-left: 1px solid var(--border); border-right: none; }
        .files-pane.open { transform: translateX(0); box-shadow: -2px 0 16px var(--shadow-color-strong); }
        main.files-collapsed .files-pane { width: min(86vw, 340px) !important; }
        main.files-collapsed .files-pane .files-body { display: flex; flex-direction: column; }
        /* Hide the desktop collapse chevrons inside drawers on mobile */
        #btn-files-toggle { display: none; }
        .threads-rail .head, .files-pane .head {
          /* Override the desktop rotating-handle: on mobile the pane is a
             drawer, so the head is a normal in-flow top bar. */
          position: static !important;
          transform: none !important;
          width: auto !important;
          padding: 8px 10px; gap: 8px; align-items: center;
        }
        .threads-rail .threads-actions, .files-pane .files-body {
          position: static !important;
        }
        .threads-rail .list { position: static !important; flex: 1; }
        .threads-rail, .files-pane { display: flex; flex-direction: column; }
        .files-pane .files-body { flex: 1; min-height: 0; overflow: auto; }
        .files-pane .row { padding: 10px 12px; font-size: 14px; min-height: 40px; }
        .threads-rail .head { display: flex; }
        .threads-rail .threads-actions #btn-new-chat { min-height: 48px; font-size: 15px; font-weight: 600; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .threads-rail .threads-actions #btn-new-chat .plus { font-size: 26px; font-weight: 400; line-height: 1; position: relative; top: -1px; }
        .threads-rail .thread { padding: 12px 14px; }
        .threads-rail .thread .title { font-size: 14px; }
        .threads-rail .thread .meta { font-size: 12px; }
        .chat-main .msg { max-width: 90%; font-size: 14px; }
        .chat-main form {
          padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
          gap: 8px;
          align-items: flex-end;
        }
        .chat-main #chat-attach { min-width: 44px; min-height: 44px; font-size: 20px; padding: 0; flex-shrink: 0; }
        .chat-main #chat-send { min-width: 56px; min-height: 44px; font-weight: 600; flex-shrink: 0; }
        .chat-main textarea { min-height: 44px; font-size: 16px; padding: 10px 10px; } /* 16px prevents iOS zoom on focus */
        .files-pane:not(.previewing) .drop-hint { display: none !important; }
      }

      /* Show delete on touch devices (no hover) */
      @media (hover: none) {
        .threads-rail .thread .del { display: flex !important; align-items: center; justify-content: center; opacity: 0.7; top: 50%; right: 4px; transform: translateY(-50%); font-size: 26px; min-width: 40px; min-height: 40px; padding: 0; }
        .threads-rail .thread .title { padding-right: 40px; }
      }
    </style>
  </head>
