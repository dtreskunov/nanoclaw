<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/ui/files/" />
    <title>NanoClaw</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: rgba(127, 127, 127, 0.25);
        --muted: rgba(127, 127, 127, 0.7);
        --accent: rgba(100, 150, 255, 0.18);
        --accent-strong: rgba(100, 150, 255, 0.35);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body { font: 14px/1.4 system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; }
      button { font: inherit; padding: 4px 10px; border: 1px solid var(--border); background: transparent; border-radius: 4px; cursor: pointer; color: inherit; }
      button:hover { background: rgba(127,127,127,0.1); }
      .icon-btn { padding: 4px 8px; }
      .empty { color: var(--muted); padding: 16px; font-style: italic; font-size: 13px; }

      /* Header */
      header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      header .brand { font-size: 14px; font-weight: 600; white-space: nowrap; }
      header select { font: inherit; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: inherit; max-width: 280px; }
      header .spacer { flex: 1; }
      header .user { font-size: 12px; color: var(--muted); }
      header .mobile-only { display: none; }

      /* Body grid */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 1fr auto auto;
        min-height: 0;
      }
      main.files-collapsed { grid-template-columns: 220px 1fr 36px auto; }
      main.preview-collapsed { grid-template-columns: 220px 1fr auto 36px; }
      main.files-collapsed.preview-collapsed { grid-template-columns: 220px 1fr 36px 36px; }

      /* Threads rail */
      .threads-rail { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
      .threads-rail .head { padding: 8px; border-bottom: 1px solid var(--border); display: flex; gap: 4px; }
      .threads-rail .head button { flex: 1; font-size: 12px; }
      .threads-rail .list { flex: 1; overflow: auto; }
      .threads-rail .thread { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); position: relative; }
      .threads-rail .thread:hover { background: rgba(127,127,127,0.08); }
      .threads-rail .thread.active { background: var(--accent); }
      .threads-rail .thread .title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 18px; }
      .threads-rail .thread .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .threads-rail .thread .del { position: absolute; top: 6px; right: 6px; padding: 0 5px; border: 0; background: transparent; cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; display: none; }
      .threads-rail .thread:hover .del { display: block; }
      .threads-rail .thread .del:hover { color: #e44; }

      /* Chat main */
      .chat-main { display: grid; grid-template-rows: 1fr auto auto auto auto; min-height: 0; position: relative; }
      .chat-main .log { overflow: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
      .chat-main .msg { padding: 6px 10px; border-radius: 6px; max-width: 78%; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
      .chat-main .msg.in { align-self: flex-end; background: var(--accent); }
      .chat-main .msg.out { align-self: flex-start; background: rgba(127, 127, 127, 0.12); }
      .chat-main .msg .files { font-size: 11px; color: var(--muted); margin-top: 4px; }
      .chat-main .msg.markdown { white-space: normal; }
      .chat-main .msg.markdown > :first-child { margin-top: 0; }
      .chat-main .msg.markdown > :last-child { margin-bottom: 0; }
      .chat-main .msg.markdown p { margin: 4px 0; }
      .chat-main .msg.markdown pre { background: rgba(127,127,127,0.18); padding: 8px; border-radius: 4px; overflow: auto; font-size: 12px; }
      .chat-main .msg.markdown code { background: rgba(127,127,127,0.18); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
      .chat-main .msg.markdown pre code { background: transparent; padding: 0; }
      .chat-main .msg.markdown ul, .chat-main .msg.markdown ol { margin: 4px 0; padding-left: 20px; }
      .chat-main .msg.markdown h1, .chat-main .msg.markdown h2, .chat-main .msg.markdown h3 { margin: 8px 0 4px; font-size: 1.05em; }
      .chat-main .msg.markdown a { color: inherit; text-decoration: underline; }
      .chat-main .msg.markdown blockquote { border-left: 3px solid rgba(127,127,127,0.4); margin: 4px 0; padding: 0 8px; color: var(--muted); font-size: 12px; }

      .chat-main .status { padding: 0 16px; font-size: 11px; color: var(--muted); min-height: 14px; }
      .chat-main .context { display: flex; align-items: center; gap: 4px; padding: 4px 16px; font-size: 11px; color: var(--muted); }
      .chat-main .context .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--accent); padding: 2px 6px; border-radius: 10px; max-width: 100%; }
      .chat-main .context .chip .path { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; font-family: ui-monospace, monospace; }
      .chat-main .context .chip button { padding: 0 4px; border: 0; background: transparent; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; }
      .chat-main .pending { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 16px; font-size: 11px; color: var(--muted); }
      .chat-main .pending .item { display: inline-flex; align-items: center; gap: 4px; background: rgba(127,127,127,0.15); padding: 2px 6px; border-radius: 10px; }
      .chat-main .pending .item button { padding: 0 4px; border: 0; background: transparent; cursor: pointer; color: inherit; font-size: 14px; line-height: 1; }
      .chat-main form { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border); }
      .chat-main textarea { flex: 1; min-height: 32px; max-height: 140px; resize: vertical; padding: 6px 8px; font: inherit; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: inherit; }
      .chat-main.drag-active { outline: 2px dashed var(--accent-strong); outline-offset: -4px; }

      /* Files pane */
      .files-pane { border-left: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; width: 280px; }
      main.files-collapsed .files-pane { width: 36px; }
      main.files-collapsed .files-pane .files-body { display: none; }
      .files-pane .head { padding: 6px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
      .files-pane .head .title { flex: 1; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      main.files-collapsed .files-pane .head .title { display: none; }
      .files-pane .breadcrumb { padding: 6px 10px; border-bottom: 1px solid var(--border); font-family: ui-monospace, monospace; font-size: 11px; word-break: break-all; }
      .files-pane .breadcrumb a { color: inherit; cursor: pointer; text-decoration: underline; }
      .files-pane .files-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      .files-pane .listing { flex: 1; overflow: auto; }
      .files-pane .row { display: flex; align-items: center; gap: 8px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
      .files-pane .row:hover { background: rgba(127, 127, 127, 0.1); }
      .files-pane .row.active { background: var(--accent); }
      .files-pane .row .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .files-pane .row .size { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

      /* Preview pane */
      .preview-pane { border-left: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; width: 360px; }
      main.preview-collapsed .preview-pane { width: 36px; }
      main.preview-collapsed .preview-pane .preview-body { display: none; }
      .preview-pane .head { padding: 6px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
      .preview-pane .head .title { flex: 1; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      main.preview-collapsed .preview-pane .head .title { display: none; }
      .preview-pane .preview-body { flex: 1; overflow: auto; padding: 12px; }
      .preview-pane pre { margin: 0; white-space: pre-wrap; word-break: break-word; font: 12px/1.5 ui-monospace, monospace; }
      .preview-pane img, .preview-pane iframe { max-width: 100%; }
      .markdown-preview { max-width: 100%; line-height: 1.5; }
      .markdown-preview pre { background: rgba(127,127,127,0.18); padding: 12px; border-radius: 6px; overflow: auto; }
      .markdown-preview code { background: rgba(127,127,127,0.18); padding: 2px 4px; border-radius: 3px; }
      .markdown-preview pre code { background: transparent; padding: 0; }
      .markdown-preview blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding-left: 12px; color: var(--muted); }
      .markdown-preview table { border-collapse: collapse; margin: 8px 0; }
      .markdown-preview th, .markdown-preview td { border: 1px solid var(--border); padding: 4px 8px; }

      /* Backdrop for mobile drawers */
      .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 5; }
      .backdrop.show { display: block; }

      /* Mobile layout */
      @media (max-width: 720px) {
        header .mobile-only { display: inline-flex; }
        header .brand { display: none; }
        main {
          grid-template-columns: 1fr !important;
          grid-template-rows: 1fr;
        }
        .threads-rail, .files-pane, .preview-pane {
          position: fixed;
          top: 0; bottom: 0;
          width: 280px !important;
          background: Canvas;
          z-index: 10;
          transition: transform 0.18s ease-out;
        }
        .threads-rail { left: 0; transform: translateX(-100%); }
        .threads-rail.open { transform: translateX(0); box-shadow: 2px 0 8px rgba(0,0,0,0.25); }
        .files-pane { right: 0; transform: translateX(100%); width: 320px !important; border-left: 1px solid var(--border); border-right: none; }
        .files-pane.open { transform: translateX(0); box-shadow: -2px 0 8px rgba(0,0,0,0.25); }
        .preview-pane { right: 0; transform: translateX(100%); width: 90vw !important; max-width: 480px; }
        .preview-pane.open { transform: translateX(0); box-shadow: -2px 0 8px rgba(0,0,0,0.25); }
        main.files-collapsed .files-pane,
        main.preview-collapsed .preview-pane { width: auto !important; }
        main.files-collapsed .files-pane .files-body,
        main.preview-collapsed .preview-pane .preview-body { display: flex; flex-direction: column; }
        .chat-main .msg { max-width: 90%; }
      }
    </style>
  </head>
  <body>
    <header>
      <button type="button" class="icon-btn mobile-only" id="btn-threads" aria-label="Threads">☰</button>
      <span class="brand">NanoClaw</span>
      <select id="group-select" aria-label="Agent group"></select>
      <div class="spacer"></div>
      <span class="user" id="me"></span>
      <button type="button" class="icon-btn mobile-only" id="btn-files" aria-label="Files">📁</button>
      <form method="POST" action="/ui/auth/logout" style="margin:0"><button type="submit">Log out</button></form>
    </header>
    <main id="main">
      <aside class="threads-rail" id="threads-rail">
        <div class="head">
          <button type="button" id="btn-new-chat">+ New chat</button>
        </div>
        <div class="list" id="threads-list"><div class="empty">No chats yet</div></div>
      </aside>
      <section class="chat-main" id="chat-main">
        <div class="log" id="chat-log"><div class="empty">Pick or start a chat.</div></div>
        <div class="status" id="chat-status"></div>
        <div class="context" id="chat-context" hidden></div>
        <div class="pending" id="chat-pending" hidden></div>
        <form id="chat-form">
          <input type="file" id="chat-file" multiple hidden />
          <button type="button" id="chat-attach" title="Attach files" aria-label="Attach files">📎</button>
          <textarea id="chat-input" rows="1" placeholder="Message the agent…"></textarea>
          <button type="submit" id="chat-send">Send</button>
        </form>
      </section>
      <aside class="files-pane" id="files-pane">
        <div class="head">
          <button type="button" class="icon-btn" id="btn-files-toggle" aria-label="Collapse files">›</button>
          <span class="title">Files</span>
        </div>
        <div class="files-body">
          <div class="breadcrumb" id="crumb"></div>
          <div class="listing" id="listing"><div class="empty">No group selected</div></div>
        </div>
      </aside>
      <aside class="preview-pane" id="preview-pane">
        <div class="head">
          <button type="button" class="icon-btn" id="btn-preview-toggle" aria-label="Collapse preview">›</button>
          <span class="title" id="preview-title">Preview</span>
        </div>
        <div class="preview-body" id="preview"><div class="empty">No file selected</div></div>
      </aside>
    </main>
    <div class="backdrop" id="backdrop"></div>
    <script src="vendor/marked.umd.js"></script>
    <script src="ui/app.js"></script>
  </body>
</html>
