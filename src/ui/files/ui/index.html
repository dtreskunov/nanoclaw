<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/ui/files/" />
    <title>NanoClaw — File Browser</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: rgba(127, 127, 127, 0.25);
        --muted: rgba(127, 127, 127, 0.7);
      }
      * { box-sizing: border-box; }
      body { font: 14px/1.4 system-ui, -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
      header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
      header h1 { font-size: 14px; margin: 0; font-weight: 600; }
      header .spacer { flex: 1; }
      header .user { font-size: 12px; color: var(--muted); }
      main { flex: 1; display: grid; grid-template-columns: 240px 1fr; min-height: 0; }
      nav { border-right: 1px solid var(--border); overflow: auto; padding: 8px 0; }
      nav .group { padding: 6px 12px; cursor: pointer; }
      nav .group:hover { background: rgba(127, 127, 127, 0.1); }
      nav .group.active { background: rgba(100, 150, 255, 0.15); font-weight: 600; }
      nav .group .meta { font-size: 11px; color: var(--muted); }
      section { display: grid; grid-template-rows: auto 1fr auto; min-height: 0; }
      .breadcrumb { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: ui-monospace, monospace; font-size: 12px; }
      .breadcrumb a { color: inherit; cursor: pointer; text-decoration: underline; }
      .panes { display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
      .listing { border-right: 1px solid var(--border); overflow: auto; }
      .listing .row { display: flex; align-items: center; gap: 8px; padding: 4px 12px; cursor: pointer; }
      .listing .row:hover { background: rgba(127, 127, 127, 0.1); }
      .listing .row.active { background: rgba(100, 150, 255, 0.15); }
      .listing .row .name { flex: 1; }
      .listing .row .size { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
      .listing .row.tier-admin .name::after { content: ' admin'; font-size: 10px; color: var(--muted); }
      .preview { overflow: auto; padding: 12px; }
      .preview pre { margin: 0; white-space: pre-wrap; word-break: break-word; font: 12px/1.5 ui-monospace, monospace; }
      .preview img, .preview iframe { max-width: 100%; }
      .empty { color: var(--muted); padding: 16px; font-style: italic; }
      button { font: inherit; padding: 4px 10px; border: 1px solid var(--border); background: transparent; border-radius: 4px; cursor: pointer; }
      .chat { border-top: 1px solid var(--border); display: grid; grid-template-rows: 1fr auto; height: 260px; min-height: 0; }
      .chat .log { overflow: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
      .chat .msg { padding: 6px 8px; border-radius: 6px; max-width: 75%; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
      .chat .msg.in { align-self: flex-end; background: rgba(100, 150, 255, 0.18); }
      .chat .msg.out { align-self: flex-start; background: rgba(127, 127, 127, 0.12); }
      .chat .msg .files { font-size: 11px; color: var(--muted); margin-top: 4px; }
      .chat .msg.markdown { white-space: normal; }
      .chat .msg.markdown > :first-child { margin-top: 0; }
      .chat .msg.markdown > :last-child { margin-bottom: 0; }
      .chat .msg.markdown p { margin: 4px 0; }
      .chat .msg.markdown pre { background: rgba(127,127,127,0.18); padding: 8px; border-radius: 4px; overflow: auto; font-size: 12px; }
      .chat .msg.markdown code { background: rgba(127,127,127,0.18); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
      .chat .msg.markdown pre code { background: transparent; padding: 0; }
      .chat .msg.markdown ul, .chat .msg.markdown ol { margin: 4px 0; padding-left: 20px; }
      .chat .msg.markdown h1, .chat .msg.markdown h2, .chat .msg.markdown h3 { margin: 8px 0 4px; font-size: 1.05em; }
      .chat .msg.markdown a { color: inherit; text-decoration: underline; }
      .chat .msg.markdown blockquote { border-left: 3px solid rgba(127,127,127,0.4); margin: 4px 0; padding: 0 8px; color: var(--muted); font-size: 12px; }
      .markdown-preview { padding: 12px 16px; max-width: 900px; line-height: 1.5; }
      .markdown-preview pre { background: rgba(127,127,127,0.18); padding: 12px; border-radius: 6px; overflow: auto; }
      .markdown-preview code { background: rgba(127,127,127,0.18); padding: 2px 4px; border-radius: 3px; }
      .markdown-preview pre code { background: transparent; padding: 0; }
      .markdown-preview blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding-left: 12px; color: var(--muted); }
      .markdown-preview table { border-collapse: collapse; margin: 8px 0; }
      .markdown-preview th, .markdown-preview td { border: 1px solid var(--border); padding: 4px 8px; }
      .chat .status { padding: 0 12px; font-size: 11px; color: var(--muted); }
      .chat form { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border); }
      .chat textarea { flex: 1; min-height: 32px; max-height: 120px; resize: vertical; padding: 6px 8px; font: inherit; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: inherit; }
    </style>
  </head>
  <body>
    <header>
      <h1>NanoClaw · File Browser</h1>
      <div class="spacer"></div>
      <span class="user" id="me"></span>
      <form method="POST" action="/ui/auth/logout"><button type="submit">Log out</button></form>
    </header>
    <main>
      <nav id="groups"><div class="empty">Loading…</div></nav>
      <section>
        <div class="breadcrumb" id="crumb"></div>
        <div class="panes">
          <div class="listing" id="listing"><div class="empty">Select a group</div></div>
          <div class="preview" id="preview"><div class="empty">Select a file</div></div>
        </div>
        <div class="chat" id="chat" hidden>
          <div class="log" id="chat-log"></div>
          <div class="status" id="chat-status"></div>
          <form id="chat-form">
            <textarea id="chat-input" rows="1" placeholder="Message the agent…"></textarea>
            <button type="submit" id="chat-send">Send</button>
          </form>
        </div>
      </section>
    </main>
    <script src="vendor/marked.umd.js"></script>
    <script src="ui/app.js"></script>
  </body>
</html>
