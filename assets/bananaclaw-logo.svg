<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <linearGradient id="banana" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <!-- Banana mark -->
  <g transform="translate(20,30)">
    <!-- stem -->
    <path d="M48 22 L42 10 L52 6 L58 16 Z" fill="#65a30d" stroke="#3f6212" stroke-width="2" stroke-linejoin="round"/>
    <!-- banana body -->
    <path d="M52 18
             C 130 12, 160 80, 145 130
             C 140 145, 122 152, 108 144
             C 122 138, 130 124, 130 110
             C 130 75, 95 40, 48 35
             Z"
          fill="url(#banana)" stroke="#854d0e" stroke-width="3" stroke-linejoin="round"/>
    <!-- highlight -->
    <path d="M70 30 C 100 38, 118 62, 124 92" stroke="#fef9c3" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- tip -->
    <circle cx="110" cy="146" r="3.5" fill="#3f3f46"/>
  </g>
  <!-- Wordmark -->
  <text x="200" y="128" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="78" letter-spacing="-2" fill="url(#text)">
    BananaClaw
  </text>
</svg>
