name: GitHub Pages

on:
  push:
    branches: [bananaclaw]
    paths:
      - 'site/**'
      - 'assets/screenshots/**'
      - 'assets/bananaclaw-logo.png'
      - 'assets/bananaclaw-icon.png'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          mkdir -p _site/screenshots
          cp assets/screenshots/*.png _site/screenshots/
          cp assets/bananaclaw-logo.png _site/bananaclaw-logo.png
          cp assets/bananaclaw-icon.png _site/bananaclaw-icon.png
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
